<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Store | Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #0b0f1a, #05070d);
            color: #e6e6e6;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 span {
            color: #00f5d4;
        }

        .logout {
            text-decoration: none;
            color: #fff;
            background: #ff355d;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .tasks {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .task-card {
            background: rgba(0, 0, 0, 0.5);
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .task-card.done {
            opacity: 0.5;
            text-decoration: line-through;
        }

        .add-task {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .add-task input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #0f1525;
            color: #fff;
        }

        .add-task button {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            background: #00f5d4;
            cursor: pointer;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .box {
            background: rgba(255, 255, 255, 0.04);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }

        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(
                #00f5d4 0deg,
                #00f5d4 var(--deg),
                rgba(255,255,255,0.1) var(--deg)
            );
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px auto;
        }

        .circle span {
            font-size: 22px;
            font-weight: bold;
        }

        /* LEVEL UP OVERLAY */
        .level-up {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #00f5d4;
            z-index: 999;
            animation: pop 0.6s ease;
        }

        @keyframes pop {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="level-up" id="levelUp">LEVEL UP!</div>

<div class="header">
    <h1>Welcome, <span>{{ user.email }}</span></h1>
    <a href="/logout" class="logout">Logout</a>
</div>

<div class="dashboard">

    <div class="tasks">
        <h2>🎯 Your Missions</h2>
        <div id="taskList"></div>

        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Add new mission..." />
            <button onclick="addTask()">ADD</button>
        </div>
    </div>

    <div class="side-panel">
        <div class="box">
            <h3>Level <span id="levelText">1</span></h3>
            <div class="circle" id="progressCircle">
                <span id="progressText">0%</span>
            </div>
            <p>XP to next level</p>
        </div>
    </div>

</div>

<script>
let tasks = [];

// 🔥 SINGLE SOURCE OF TRUTH (from backend only)
let level = 1;
let xp = 0;
let xpLimit = 200;

/* LOAD USER STATS */
async function loadUserStats() {
    const res = await fetch("/api/user-stats");
    const data = await res.json();

    level = data.level;
    xp = data.xp;
    xpLimit = data.xp_required;

    updateProgress();
}

/* LOAD TASKS */
async function loadTasks() {
    const res = await fetch("/api/tasks");
    tasks = await res.json();
    renderTasks();
}

/* ADD TASK */
async function addTask() {
    const input = document.getElementById("taskInput");
    if (!input.value.trim()) return;

    await fetch("/api/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: input.value })
    });

    input.value = "";
    loadTasks();
}

/* TOGGLE TASK */
async function toggleTask(taskId) {
    const res = await fetch(`/api/tasks/${taskId}`, {
        method: "PATCH"
    });

    const data = await res.json();

    // 🔥 OVERWRITE UI STATE FROM BACKEND
    level = data.level;
    xp = data.xp;
    xpLimit = data.xp_required;

    updateProgress();
    loadTasks();
}

/* RENDER TASKS */
function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task-card" + (task.done ? " done" : "");
        div.innerHTML = `<p>${task.text}</p><span>${task.done ? "✔" : "⏳"}</span>`;
        div.onclick = () => toggleTask(task.id);
        list.appendChild(div);
    });
}

/* UPDATE PROGRESS UI */
function updateProgress() {
    const percent = Math.round((xp / xpLimit) * 100);
    const deg = percent * 3.6;

    document.getElementById("levelText").innerText = level;
    document.getElementById("progressText").innerText = percent + "%";
    document
        .getElementById("progressCircle")
        .style.setProperty("--deg", deg + "deg");
}

/* INITIAL LOAD */
loadUserStats();
loadTasks();
</script>
</body>
</html>
